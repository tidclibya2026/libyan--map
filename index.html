<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>خريطة ليبيا السياحية -مشروع أطلس ليبيا السياحي | </title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .info-panel { position: absolute; bottom: 20px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; pointer-events: none; direction: ltr; font-family: monospace; }
        .legend { background: white; padding: 8px 12px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.4); line-height: 1.4; font-size: 12px; max-height: 80vh; overflow-y: auto; direction: rtl; }
        .legend h4 { margin: 0 0 5px 0; font-size: 14px; }
        .legend i { display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; border-radius: 50%; margin-left: 8px; font-style: normal; font-weight: bold; }
        .legend span { vertical-align: middle; }
        .leaflet-control-layers { direction: rtl; }
        .leaflet-control-attribution { font-size: 9px; }
        @media (max-width: 600px) { .legend { font-size: 10px; max-height: 50vh; } }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; flex-direction: column; pointer-events: none; }
        .loading-overlay p { background: rgba(0,0,0,0.8); padding: 12px 24px; border-radius: 40px; }
        .custom-marker-icon { display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="loadingOverlay" class="loading-overlay" style="display: flex;">
    <p>⏳ جاري تحميل البيانات من GitHub ...</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
    // --------------------------------------------------------------
    // تكوين الخريطة الأساسية
    // --------------------------------------------------------------
    const map = L.map('map').setView([28.5, 17.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 18,
        minZoom: 4
    }).addTo(map);
    
    // --------------------------------------------------------------
    // تصنيف المعالم (بناءً على الاسم والوصف)
    // --------------------------------------------------------------
    function getCategory(feature) {
        const name = (feature.properties.name || '').toLowerCase();
        let desc = '';
        if (feature.properties.description) {
            if (typeof feature.properties.description === 'object' && feature.properties.description.value)
                desc = feature.properties.description.value.toLowerCase();
            else desc = String(feature.properties.description).toLowerCase();
        }
        const text = name + ' ' + desc;
        
        if (text.includes('فندق') || text.includes('منتجع') || text.includes('hotel') || text.includes('resort') || 
            text.includes('فيلا') || text.includes('نزل') || text.includes('شقق فندقية') || text.includes('ضيافة') ||
            text.includes('موتيل') || text.includes('استراحة')) return 'hotels';
        if (text.includes('مطعم') || text.includes('restaurant') || text.includes('اكلات') || text.includes('بوفيه')) return 'restaurants';
        if (text.includes('مقهى') || text.includes('كافيه') || text.includes('cafe') || text.includes('كافتيريا') || text.includes('شاي')) return 'cafes';
        if (text.includes('قرية') || text.includes('مدينة') || text.includes('تجمع سكاني') || text.includes('بلدة') || 
            text.includes('منطقة') || text.includes('حي') || text.includes('عزبة') || text.includes('أولاد')) return 'villages';
        if (text.includes('بحيرة') || text.includes('وادي') || text.includes('جبل') || text.includes('كهف') || 
            text.includes('شاطىء') || text.includes('جزيرة') || text.includes('سبخة') || text.includes('غابة') || 
            text.includes('منتزه') || text.includes('طبيعية') || text.includes('قوس صخري') || text.includes('شلال') ||
            text.includes('عين') || text.includes('نبع') || text.includes('رمال') || text.includes('كثبان') || 
            text.includes('بركان') || text.includes('قارة') || text.includes('جرف') || text.includes('خليج')) return 'natural';
        if (text.includes('أثري') || text.includes('تاريخي') || text.includes('قلعة') || text.includes('حصن') || 
            text.includes('قصر') || text.includes('أطلال') || text.includes('مقبرة') || text.includes('ضريح') || 
            text.includes('معبد') || text.includes('متحف') || text.includes('كنيسة أثرية') || text.includes('مدينة قديمة') ||
            text.includes('صنم') || text.includes('مسلة') || text.includes('فسيفساء') || text.includes('بقايا') ||
            text.includes('روماني') || text.includes('جرمنتي') || text.includes('موقع أثري') || text.includes('إغريقي')) return 'historical';
        if (text.includes('مسجد') || text.includes('جامع') || text.includes('زاوية') || text.includes('كنيسة') || 
            text.includes('معبد يهودي') || text.includes('ضريح ولي') || text.includes('كنيس') || text.includes('مصلى')) return 'religious';
        if (text.includes('مستشفى') || text.includes('مدرسة') || text.includes('مطار') || text.includes('ميناء') || 
            text.includes('محطة وقود') || text.includes('مصرف') || text.includes('بريد') || text.includes('شرطة') ||
            text.includes('عيادة') || text.includes('مركز صحي') || text.includes('جامعة') || text.includes('كلية') ||
            text.includes('ملعب') || text.includes('مدينة رياضية') || text.includes('مكتب بريد') || text.includes('مركز شرطة')) return 'services';
        return 'other';
    }
    
    // تعريف الأيقونات لكل فئة
    const categoryIcons = {
        hotels: { icon: '🏨', bg: '#e53935', label: 'فنادق' },
        restaurants: { icon: '🍽️', bg: '#fb8c00', label: 'مطاعم' },
        cafes: { icon: '☕', bg: '#795548', label: 'مقاهي' },
        villages: { icon: '🏘️', bg: '#8e24aa', label: 'قرى' },
        natural: { icon: '🏞️', bg: '#43a047', label: 'طبيعة' },
        historical: { icon: '🏛️', bg: '#1e88e5', label: 'تاريخ وآثار' },
        religious: { icon: '🕌', bg: '#00acc1', label: 'ديني' },
        services: { icon: '⚙️', bg: '#fdd835', label: 'خدمات' },
        other: { icon: '📍', bg: '#9e9e9e', label: 'أخرى' }
    };
    
    const layerNames = {
        hotels: '🏨 فنادق ومنتجعات',
        restaurants: '🍽️ مطاعم',
        cafes: '☕ مقاهي',
        villages: '🏘️ قرى ومدن',
        natural: '🏞️ مواقع طبيعية',
        historical: '🏛️ مواقع تاريخية وأثرية',
        religious: '🕌 مواقع دينية',
        services: '⚙️ خدمات (صحة، تعليم، وقود)',
        other: '📌 أخرى'
    };
    
    // إنشاء مجموعات عنقودية
    const clusterGroups = {};
    const overlayControl = {};
    for (const [cat, info] of Object.entries(categoryIcons)) {
        const cluster = L.markerClusterGroup({
            chunkedLoading: true,
            maxClusterRadius: 50,
            iconCreateFunction: function(cluster) {
                const count = cluster.getChildCount();
                return L.divIcon({
                    html: `<div style="background-color:${info.bg}; color:white; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:16px; border:2px solid white; box-shadow:0 0 4px rgba(0,0,0,0.5);">${count}</div>`,
                    iconSize: [36, 36],
                    className: 'custom-cluster'
                });
            }
        });
        clusterGroups[cat] = cluster;
        map.addLayer(cluster);
        overlayControl[layerNames[cat]] = cluster;
    }
    
    function createCustomMarker(category) {
        const info = categoryIcons[category] || categoryIcons.other;
        return L.divIcon({
            html: `<div class="custom-marker-icon" style="background-color:${info.bg}; width:28px; height:28px; font-size:16px;">${info.icon}</div>`,
            iconSize: [28, 28],
            className: '',
            popupAnchor: [0, -12]
        });
    }
    
    // --------------------------------------------------------------
    // منع الازدواجية: استخدام Map لتخزين المعالم الفريدة
    // المفتاح: "lat,lng" + اختيارياً + اسم مختصر
    // استراتيجية: الإحداثيات الدقيقة + الاسم (إن وجد) لتجنب فقدان معالم مختلفة في نفس النقطة
    // --------------------------------------------------------------
    function removeDuplicates(features) {
        const uniqueMap = new Map();  // key => feature
        let duplicateCount = 0;
        
        features.forEach(feature => {
            if (!feature.geometry || feature.geometry.type !== 'Point') return;
            const coords = feature.geometry.coordinates;
            if (coords.length < 2) return;
            const lat = coords[1];
            const lng = coords[0];
            if (isNaN(lat) || isNaN(lng)) return;
            
            // تقريب الإحداثيات إلى 5 منازل عشرية لتجنب اختلافات طفيفة (حوالي 1 متر)
            const roundedLat = Math.round(lat * 1e5) / 1e5;
            const roundedLng = Math.round(lng * 1e5) / 1e5;
            let name = (feature.properties.name || '').trim();
            // إذا كان الاسم طويلاً جداً نأخذ أول 50 حرفاً
            if (name.length > 50) name = name.substring(0, 50);
            
            // مفتاح أساسي: الإحداثيات + الاسم (لأنه قد يكون نفس الموقع لمعلمين مختلفين مثل مطعم ومقهى)
            const key = `${roundedLat},${roundedLng}|${name}`;
            
            if (!uniqueMap.has(key)) {
                uniqueMap.set(key, feature);
            } else {
                duplicateCount++;
                // دمج الوصف إذا أمكن (نضيف معلومات من التكرار)
                const existing = uniqueMap.get(key);
                let existingDesc = existing.properties.description || '';
                let newDesc = feature.properties.description || '';
                if (newDesc && !existingDesc.includes(newDesc)) {
                    existing.properties.description = existingDesc + ' ; ' + newDesc;
                }
                // تحديث الاسم إذا كان أكثر دقة
                if (name && name.length > (existing.properties.name || '').length) {
                    existing.properties.name = name;
                }
            }
        });
        
        console.log(`تمت إزالة ${duplicateCount} عنصراً مكرراً.`);
        return Array.from(uniqueMap.values());
    }
    
    // --------------------------------------------------------------
    // إضافة المعالم بعد إزالة الازدواجية
    // --------------------------------------------------------------
    let totalProcessed = 0;
    function addFeaturesToMap(uniqueFeatures) {
        uniqueFeatures.forEach(feature => {
            const coords = feature.geometry.coordinates;
            const lat = coords[1];
            const lng = coords[0];
            const category = getCategory(feature);
            const markerIcon = createCustomMarker(category);
            const marker = L.marker([lat, lng], { icon: markerIcon });
            
            let name = feature.properties.name || 'بدون اسم';
            let description = feature.properties.description || '';
            let cleanDesc = '';
            if (description) {
                if (typeof description === 'object' && description.value) cleanDesc = description.value;
                else cleanDesc = String(description);
                cleanDesc = cleanDesc.replace(/<img[^>]*>/g, ' [صورة] ').replace(/<a[^>]*>/g, '').replace(/<\/a>/g, '');
                if (cleanDesc.length > 250) cleanDesc = cleanDesc.substring(0, 250) + '...';
            }
            if (!cleanDesc) cleanDesc = '📍 معلم سياحي';
            
            const popupContent = `
                <div dir="rtl" style="max-width:280px; font-family:Tahoma;">
                    <strong style="font-size:1.1rem;">${escapeHtml(name)}</strong><br>
                    <div style="margin-top:5px; font-size:0.85rem; color:#333;">${escapeHtml(cleanDesc)}</div>
                    <div style="margin-top:4px; font-size:0.7rem; color:#888;">${layerNames[category] || 'موقع'}</div>
                </div>
            `;
            marker.bindPopup(popupContent);
            clusterGroups[category].addLayer(marker);
            totalProcessed++;
        });
        
        console.log(`تمت إضافة ${totalProcessed} معلم فريد إلى الخريطة`);
        const panelDiv = document.querySelector('.info-panel');
        if (panelDiv) panelDiv.innerHTML = `📍 إجمالي المواقع الفريدة: ${totalProcessed} موقع | تمت إزالة التكرارات تلقائياً`;
        const loadingDiv = document.getElementById('loadingOverlay');
        if (loadingDiv) loadingDiv.style.display = 'none';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // --------------------------------------------------------------
    // تحميل البيانات من GitHub ثم إزالة التكرارات وعرضها
    // --------------------------------------------------------------
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/tidclibya2026/libyan--map/main/mapatlas.geojson';
    
    fetch(GITHUB_RAW_URL)
        .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log('تم تحميل البيانات الكاملة من GitHub');
            if (data && data.features && Array.isArray(data.features)) {
                // الخطوة الأساسية: إزالة التكرارات
                const uniqueFeatures = removeDuplicates(data.features);
                addFeaturesToMap(uniqueFeatures);
            } else {
                throw new Error('بيانات غير صالحة');
            }
        })
        .catch(error => {
            console.error('خطأ في تحميل البيانات:', error);
            const loadingDiv = document.getElementById('loadingOverlay');
            if (loadingDiv) {
                loadingDiv.innerHTML = '<p style="background:#d32f2f;">⚠️ فشل تحميل البيانات من GitHub. يتم عرض بيانات توضيحية محدودة .</p>';
                setTimeout(() => { if (loadingDiv) loadingDiv.style.display = 'none'; }, 4000);
            }
            // بيانات احتياطية مع تكرارات متعمدة لاختبار إزالة الازدواجية
            const fallbackFeatures = [
                {"geometry":{"type":"Point","coordinates":[13.187,32.857]},"properties":{"name":"فندق كورنثيا طرابلس","description":"فندق 5 نجوم على الكورنيش"}},
                {"geometry":{"type":"Point","coordinates":[13.187,32.857]},"properties":{"name":"فندق كورنثيا (نسخة مكررة)","description":"نفس الموقع - سيتم دمجه"}},
                {"geometry":{"type":"Point","coordinates":[13.176,32.899]},"properties":{"name":"مطعم الأندلس","description":"مأكولات بحرية تقليدية"}},
                {"geometry":{"type":"Point","coordinates":[13.192,32.890]},"properties":{"name":"مقهى الظهرة","description":"أجواء عائلية"}},
                {"geometry":{"type":"Point","coordinates":[14.290,32.638]},"properties":{"name":"لبدة الأثرية (لبتس ماغنا)","description":"مدينة رومانية قديمة - موقع تراث عالمي"}},
                {"geometry":{"type":"Point","coordinates":[14.290,32.638]},"properties":{"name":"لبتس ماغنا (تكرار)","description":"نفس الموقع الأثري"}},
                {"geometry":{"type":"Point","coordinates":[12.485,32.805]},"properties":{"name":"صبراتة الأثرية","description":"مدرج روماني ومدينة فينيقية"}},
                {"geometry":{"type":"Point","coordinates":[21.822,32.862]},"properties":{"name":"شحات (قورينا)","description":"مدينة إغريقية أثرية"}},
                {"geometry":{"type":"Point","coordinates":[13.083,32.848]},"properties":{"name":"غابة قرجي","description":"منتزه طبيعي"}},
                {"geometry":{"type":"Point","coordinates":[20.067,32.117]},"properties":{"name":"جامع العصمان بنغازي","description":"جامع تاريخي"}},
                {"geometry":{"type":"Point","coordinates":[10.568,24.812]},"properties":{"name":"تادرارت أكاكوس","description":"رسوم صخرية – موقع تراث عالمي"}},
                {"geometry":{"type":"Point","coordinates":[9.496,30.133]},"properties":{"name":"غدامس القديمة","description":"مدينة تاريخية فريدة"}}
            ];
            const uniqueFallback = removeDuplicates(fallbackFeatures);
            addFeaturesToMap(uniqueFallback);
        });
    
    // إضافة لوحة التحكم بالطبقات
    L.control.layers(null, overlayControl, { collapsed: false, position: 'topright' }).addTo(map);
    
    // وسيلة إيضاح
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<h4>📋 تصنيف المواقع</h4>';
        for (const [cat, name] of Object.entries(layerNames)) {
            const iconInfo = categoryIcons[cat] || categoryIcons.other;
            div.innerHTML += `<i style="background-color:${iconInfo.bg};">${iconInfo.icon}</i> <span>${name}</span><br>`;
        }
        div.innerHTML += '<hr><small>✔️ تم حذف النقاط المكررة تلقائياً</small><br><small>🎨 أيقونات مميزة لكل فئة</small>';
        return div;
    };
    legend.addTo(map);
    
    // شريط معلومات
    const infoPanel = L.control({ position: 'bottomleft' });
    infoPanel.onAdd = function() {
        const div = L.DomUtil.create('div', 'info-panel');
        div.innerHTML = '🔄 جاري تحميل البيانات  ...';
        return div;
    };
    infoPanel.addTo(map);
    
    map.zoomControl.setPosition('topleft');
    console.log('خريطة ليبيا - تم تفعيل النظام بنجاح');
</script>
</body>
</html>
